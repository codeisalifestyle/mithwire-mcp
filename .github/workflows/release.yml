name: release

# One workflow owns the whole release path: PyPI publishing AND Docker image.
#
# PyPI/TestPyPI Trusted Publishing matches the OIDC token against the exact
# workflow filename + environment, so the upload step cannot live elsewhere.
#
# Docker is here (not in a separate docker.yml) because release-please creates
# tags with GITHUB_TOKEN, and GitHub suppresses workflow triggers from
# GITHUB_TOKEN-authored events.  A standalone push-tag-triggered docker.yml
# would silently skip on release-please releases.
#
# Three entry points:
#   * push to main  -> release-please maintains a release PR; when merged,
#                      it bumps the version, tags, and cuts a GitHub Release.
#                      The same run then builds + publishes PyPI + Docker.
#   * workflow_dispatch (no tag) -> TestPyPI-only dry run (no Docker).
#   * workflow_dispatch (tag set) -> publish that exact existing tag to
#                      TestPyPI + PyPI + Docker.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)publish (e.g. v0.3.1). Leave blank for a TestPyPI dry run."
        required: false
        default: ""
      reason:
        description: "Why this manual dispatch (audit note only)."
        required: false
        default: "manual TestPyPI dry run"

permissions:
  contents: write
  pull-requests: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release PR / tag
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    name: Build distribution
    needs: release-please
    if: |
      always() && (
        github.event_name == 'workflow_dispatch'
        || needs.release-please.outputs.release_created == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_prerelease: ${{ steps.ver.outputs.is_prerelease }}
      publish_pypi: ${{ steps.ver.outputs.publish_pypi }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Resolve version
        id: ver
        run: |
          set -euo pipefail
          BASE=$(python3 -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -z "$INPUT_TAG" ]; then
            VER="${BASE}.dev$(date +%Y%m%d%H%M%S)"
            sed -i -E "s/^version = \".*\"/version = \"${VER}\"/" pyproject.toml
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "publish_pypi=false" >> "$GITHUB_OUTPUT"
          else
            VER="$BASE"
            case "$VER" in
              *a*|*b*|*rc*|*dev*|*post*)
                echo "is_prerelease=true"  >> "$GITHUB_OUTPUT"
                echo "publish_pypi=false" >> "$GITHUB_OUTPUT" ;;
              *)
                echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
                echo "publish_pypi=true"  >> "$GITHUB_OUTPUT" ;;
            esac
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Building version $VER (publish_pypi=$(grep ^publish_pypi $GITHUB_OUTPUT | cut -d= -f2))"
      - name: Build
        run: uv build
      - name: Show artifacts
        run: ls -l dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  testpypi:
    name: Publish to TestPyPI
    needs: build
    if: ${{ always() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  pypi:
    name: Publish to PyPI
    needs: build
    if: ${{ always() && needs.build.result == 'success' && needs.build.outputs.publish_pypi == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  # 5. Docker: build and push to GHCR on stable releases or tag-replay
  #    dispatches.  Skipped on TestPyPI dry runs (no tag to version the image).
  docker:
    name: Docker image (GHCR)
    needs: [release-please, build]
    if: |
      always() && needs.build.result == 'success' && (
        needs.release-please.outputs.release_created == 'true'
        || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name || github.event.inputs.tag || github.ref }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve tags
        id: tags
        run: |
          REPO="ghcr.io/${{ github.repository }}"
          REPO="${REPO,,}"
          TAG="${{ needs.release-please.outputs.tag_name || github.event.inputs.tag }}"
          VER="${TAG#v}"
          echo "tags=${REPO}:${VER},${REPO}:latest" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
