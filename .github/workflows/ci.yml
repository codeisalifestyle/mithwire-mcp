name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # 1. Lint + fast unit tests -- no Chrome.  Anything tagged
  #    ``stealth_e2e`` is excluded (those need a real browser).
  # -----------------------------------------------------------------------
  unit-fast:
    name: Lint & unit tests (no Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Install Python + dependencies
        run: uv sync --group dev
      - name: Lint
        run: uv run ruff check .
      - name: Run fast unit tests
        run: uv run pytest -m 'not stealth_e2e' --maxfail=1

  # -----------------------------------------------------------------------
  # 2. Stealth e2e -- spawn a real Chrome via BridgeBrowser and verify
  #    that every FingerprintConfig field reaches the browser.
  # -----------------------------------------------------------------------
  e2e-application:
    name: Stealth e2e (real Chrome)
    runs-on: ubuntu-latest
    needs: unit-fast
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Allow unprivileged user namespaces (Ubuntu 24.04 AppArmor)
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Install Python + dependencies
        run: uv sync --group dev
      - name: Run stealth e2e tests
        env:
          CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: uv run pytest tests/test_fingerprint_application.py -v --maxfail=1

  # -----------------------------------------------------------------------
  # 3. Anti-detect matrix -- the product-level gate.  Uses the stealth
  #    engine (CloakBrowser) on Linux with linux-* profiles only.
  #
  #    CI pass definition (both must hold for every profile):
  #      - deviceandbrowserinfo.com /are_you_a_bot: HUMAN
  #      - sannysoft: 0 failed cells (warns allowed)
  #
  #    CreepJS and fingerprint.com are informational only.
  #    Third-party detection sites, BrowserLeaks, captcha, and IP-quality
  #    probes are skipped (flaky external deps, not gate sites).
  # -----------------------------------------------------------------------
  detection-matrix:
    name: Anti-detect matrix (stealth engine)
    runs-on: ubuntu-latest
    needs: unit-fast
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-liberation \
            fonts-noto-color-emoji \
            libgbm1 \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libasound2t64
      - name: Install Python + dependencies (with stealth extra)
        run: uv sync --group dev --extra stealth
      - name: Cache CloakBrowser binary
        uses: actions/cache@v4
        with:
          path: ~/.cloakbrowser
          key: cloakbrowser-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: cloakbrowser-${{ runner.os }}-
      - name: Run anti-detect matrix (stealth engine, linux profiles)
        id: matrix
        run: |
          uv run python scripts/profile_matrix.py \
            --driver bridge \
            --headless \
            --engine stealth \
            --profiles-filter 'linux-*' \
            --skip-fpcom \
            --skip-browserleaks \
            --skip-captcha \
            --skip-detection \
            --skip-ipquality \
            --report /tmp/matrix-report.md
      - name: Publish matrix report to job summary
        if: always()
        run: |
          {
            echo "## Anti-detect matrix (stealth engine)"
            echo ""
            echo "**CI pass definition:** DAB /are_you_a_bot reports HUMAN and"
            echo "sannysoft shows 0 failed cells, for every linux-* profile."
            echo ""
            if [ -f /tmp/matrix-report.md ]; then cat /tmp/matrix-report.md; else echo "(no report produced)"; fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload per-profile JSON artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-matrix-results
          path: /tmp/profile-matrix/*.json
          if-no-files-found: ignore
          retention-days: 14
