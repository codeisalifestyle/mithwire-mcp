<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>nodriver-reforged dashboard</title>
    <style>
      :root {
        --bg: #09090b;
        --panel: #111114;
        --border: #27272a;
        --text: #e4e4e7;
        --muted: #a1a1aa;
        --accent: #22c55e;
        --warn: #facc15;
        --error: #ef4444;
        --mono: ui-monospace, "SF Mono", Menlo, monospace;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
      }
      header h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border: 1px solid var(--border);
        border-radius: 999px;
        font-size: 11px;
        color: var(--muted);
      }
      main {
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        max-width: 1200px;
        margin: 0 auto;
      }
      section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
      }
      section h2 {
        margin: 0 0 12px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
      }
      input,
      button {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 6px 10px;
        font: inherit;
      }
      input {
        flex: 1;
        font-family: var(--mono);
      }
      button {
        cursor: pointer;
      }
      button:hover {
        border-color: var(--text);
      }
      pre {
        background: #000;
        padding: 12px;
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        max-height: 240px;
        overflow: auto;
        margin: 0;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 220px;
        overflow: auto;
      }
      li {
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 11px;
      }
      .pill-ok {
        color: var(--accent);
      }
      .pill-warn {
        color: var(--warn);
      }
      .pill-err {
        color: var(--error);
      }
      .full {
        grid-column: 1 / -1;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>nodriver-reforged · dashboard</h1>
      <span id="status" class="badge">connecting…</span>
    </header>
    <main>
      <section>
        <h2>Token</h2>
        <div class="row">
          <input id="token" placeholder="dashboard token (paste from server logs)" />
          <button id="save-token">Save</button>
        </div>
        <p style="color: var(--muted); font-size: 11px">
          Stored in <code>localStorage</code>. Required for every API call. Add <code>?token=…</code>
          to the URL once and the page will save it for you.
        </p>
      </section>
      <section>
        <h2>System</h2>
        <pre id="system">—</pre>
      </section>
      <section>
        <h2>Sessions</h2>
        <pre id="sessions">—</pre>
      </section>
      <section>
        <h2>Profiles</h2>
        <pre id="profiles">—</pre>
      </section>
      <section class="full">
        <h2>Live events</h2>
        <ul id="events"></ul>
      </section>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const status = $("status");
      const TOKEN_KEY = "nrbmcp_dashboard_token";

      function pickToken() {
        const url = new URL(window.location.href);
        const fromUrl = url.searchParams.get("token");
        if (fromUrl) {
          localStorage.setItem(TOKEN_KEY, fromUrl);
          url.searchParams.delete("token");
          window.history.replaceState({}, "", url.toString());
        }
        return localStorage.getItem(TOKEN_KEY) || "";
      }
      $("token").value = pickToken();
      $("save-token").addEventListener("click", () => {
        localStorage.setItem(TOKEN_KEY, $("token").value.trim());
        bootstrap();
      });

      async function api(path) {
        const token = pickToken();
        const res = await fetch(path, {
          headers: token ? { "X-Dashboard-Token": token } : {},
        });
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        return res.json();
      }

      function show(id, value) {
        $(id).textContent = JSON.stringify(value, null, 2);
      }

      async function refresh() {
        try {
          const [system, sessions, profiles] = await Promise.all([
            api("/api/system"),
            api("/api/sessions"),
            api("/api/profiles"),
          ]);
          show("system", system);
          show("sessions", sessions);
          show("profiles", profiles);
          status.textContent = "ready";
          status.className = "badge pill-ok";
        } catch (err) {
          status.textContent = String(err.message || err);
          status.className = "badge pill-err";
        }
      }

      function openEvents() {
        const token = pickToken();
        const proto = window.location.protocol === "https:" ? "wss:" : "ws:";
        const url = `${proto}//${window.location.host}/api/events${token ? `?token=${encodeURIComponent(token)}` : ""}`;
        const ws = new WebSocket(url);
        ws.onmessage = (msg) => {
          const li = document.createElement("li");
          li.textContent = msg.data;
          $("events").prepend(li);
          while ($("events").childElementCount > 100) {
            $("events").removeChild($("events").lastChild);
          }
          if (msg.data.includes('"session.')) refresh();
        };
        ws.onclose = () => {
          setTimeout(openEvents, 2000);
        };
      }

      function bootstrap() {
        refresh();
        openEvents();
      }
      bootstrap();
      setInterval(refresh, 5000);
    </script>
  </body>
</html>
